<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; color: #333; padding: 16px; }
    h3 { margin-bottom: 14px; font-size: 15px; color: #222; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; margin-top: 10px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=date] {
      width: 100%; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 13px;
    }
    input:focus { outline: none; border-color: #4a90d9; }
    .search-btn {
      padding: 8px 18px; background: #1a56db; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap;
    }
    .search-btn:hover { background: #1545b3; }
    .section {
      background: #f7f9fc; border: 1px solid #dce7f5;
      border-radius: 5px; padding: 12px; margin-bottom: 12px;
    }
    .section-title {
      font-weight: bold; font-size: 11px; color: #666; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .media-set-item {
      font-size: 12px; color: #444; padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    .media-set-item:last-child { border-bottom: none; }
    .row-count { font-size: 11px; color: #888; margin-top: 6px; }
    .add-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 5px; padding: 12px; }
    .add-section-title { font-weight: bold; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .msg { padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
    .msg.info { background: #e8f0fe; color: #1a56db; border: 1px solid #c5d7f7; }
    .msg.error { background: #fce8e6; color: #c0392b; border: 1px solid #f5c6c3; }
    .msg.success { background: #e6f4ea; color: #1e6b2e; border: 1px solid #aad4b2; }
    .footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .cancel-btn {
      padding: 8px 18px; background: #fff; color: #555;
      border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .confirm-btn {
      padding: 8px 24px; background: #1a56db; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .confirm-btn:hover { background: #1545b3; }
    .confirm-btn:disabled { background: #aaa; cursor: not-allowed; }
    #addArea { display: none; }
  </style>
</head>
<body>

<h3>媒体セット追加</h3>

<div class="row">
  <label style="margin:0; white-space:nowrap;">伝票番号：</label>
  <input type="text" id="slipNo" placeholder="例：08878" style="width:130px;" maxlength="10">
  <button class="search-btn" onclick="searchSlip()">検索</button>
</div>

<div id="msgArea"></div>

<div id="addArea">
  <div class="section">
    <div class="section-title">現在の媒体セット</div>
    <div id="currentSets"></div>
    <div class="row-count" id="rowCount"></div>
  </div>

  <div class="add-section">
    <div class="add-section-title">追加する媒体セット</div>
    <label>媒体名 <span style="color:red">*</span></label>
    <input type="text" id="newMedia" placeholder="例：Vogue">
    <label>種別 <span style="color:red">*</span></label>
    <select id="newType">
      <option value="雑誌(紙面)">雑誌(紙面)</option>
      <option value="雑誌(WEB)">雑誌(WEB)</option>
      <option value="TV">TV</option>
      <option value="その他">その他</option>
    </select>
    <label>月号</label>
    <input type="text" id="newIssue" placeholder="例：4月号">
    <label>テーマ/着用者</label>
    <input type="text" id="newTheme" placeholder="例：夏コーデ/石上恵">
    <label>公開日</label>
    <input type="date" id="newReleaseDate">
  </div>

  <div class="footer">
    <button class="cancel-btn" onclick="google.script.host.close()">キャンセル</button>
    <button class="confirm-btn" id="addBtn" onclick="addMediaSet()">追加する</button>
  </div>
</div>

<script>
  function showMsg(text, type) {
    document.getElementById('msgArea').innerHTML = text
      ? '<div class="msg ' + type + '">' + text + '</div>'
      : '';
  }

  function searchSlip() {
    var slipNo = document.getElementById('slipNo').value.trim();
    if (!slipNo) { showMsg('伝票番号を入力してください。', 'error'); return; }

    showMsg('検索中...', 'info');
    document.getElementById('addArea').style.display = 'none';

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res.found) {
          showMsg('該当する伝票番号が見つかりませんでした。', 'error');
          return;
        }
        showMsg('', '');
        renderCurrentSets(res);
        document.getElementById('addArea').style.display = 'block';
      })
      .withFailureHandler(function(err) {
        showMsg('エラー: ' + err.message, 'error');
      })
      .getMediaSetsForSlip(slipNo);
  }

  function renderCurrentSets(res) {
    var container = document.getElementById('currentSets');
    container.innerHTML = '';
    if (res.mediaSets.length === 0) {
      container.innerHTML = '<div style="color:#999;font-size:12px;">（なし）</div>';
    } else {
      res.mediaSets.forEach(function(ms, i) {
        var div = document.createElement('div');
        div.className = 'media-set-item';
        div.textContent = (i + 1) + '.  ' + (ms.type ? ms.type + ' / ' : '') + ms.media +
          (ms.issue ? ' / ' + ms.issue : '') +
          (ms.theme ? ' / ' + ms.theme : '') +
          (ms.releaseDate ? ' / ' + ms.releaseDate : '');
        container.appendChild(div);
      });
    }
    document.getElementById('rowCount').textContent = '対象: ' + res.rowCount + ' アイテム行';
  }

  function addMediaSet() {
    var slipNo = document.getElementById('slipNo').value.trim();
    var media  = document.getElementById('newMedia').value.trim();
    if (!media) { showMsg('媒体名を入力してください。', 'error'); return; }

    var btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.textContent = '処理中...';

    var mediaSet = {
      media:       media,
      type:        document.getElementById('newType').value,
      issue:       document.getElementById('newIssue').value.trim(),
      theme:       document.getElementById('newTheme').value.trim(),
      releaseDate: document.getElementById('newReleaseDate').value
    };

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = '追加する';
        if (res.success) {
          showMsg(res.updated + ' アイテム行に媒体セットを追加しました。', 'success');
          document.getElementById('addArea').style.display = 'none';
          // 入力をリセット
          ['newMedia','newIssue','newTheme','newReleaseDate'].forEach(function(id) {
            document.getElementById(id).value = '';
          });
        } else {
          showMsg(res.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = '追加する';
        showMsg('システムエラー: ' + err.message, 'error');
      })
      .addMediaSetToSlip({ slipNo: slipNo, mediaSet: mediaSet });
  }
</script>
</body>
</html>
