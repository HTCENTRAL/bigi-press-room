<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; color: #333; background: #f9f9f9; }
    .section { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; margin: 8px; }
    .section-title { font-weight: bold; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; margin-top: 8px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=date], input[type=number] {
      width: 100%; padding: 7px 9px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #4a90d9; }
    .media-set {
      padding: 10px; background: #f7f9fc; border: 1px solid #dce7f5;
      border-radius: 5px; margin-bottom: 8px; position: relative;
    }
    .media-set-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .media-set-grid .full { grid-column: 1 / -1; }
    .item-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      padding: 10px; background: #f7f9fc; border: 1px solid #dce7f5;
      border-radius: 5px; margin-bottom: 8px; position: relative;
    }
    .item-row .full { grid-column: 1 / -1; }
    .remove-btn {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; color: #cc0000; font-size: 16px;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .remove-btn:hover { color: #990000; }
    .add-btn {
      width: 100%; padding: 8px; background: #e8f0fe; color: #1a56db;
      border: 1px dashed #93b4f5; border-radius: 4px; cursor: pointer;
      font-size: 13px; margin-top: 2px; transition: background 0.2s;
    }
    .add-btn:hover { background: #d0e1fd; }
    .submit-btn {
      width: calc(100% - 16px); margin: 8px; padding: 12px;
      background: #1a56db; color: #fff; border: none; border-radius: 6px;
      font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s;
    }
    .submit-btn:hover { background: #1545b3; }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
    .result-box {
      margin: 8px; padding: 12px; background: #e6f4ea; border: 1px solid #aad4b2;
      border-radius: 6px; display: none;
    }
    .result-box.error { background: #fce8e6; border-color: #f5c6c3; }
    .result-title { font-weight: bold; margin-bottom: 8px; color: #1e6b2e; }
    .result-box.error .result-title { color: #c0392b; }
    textarea.msg-text {
      width: 100%; height: 160px; font-size: 12px; font-family: monospace;
      border: 1px solid #ccc; border-radius: 4px; padding: 8px; resize: vertical;
    }
    .copy-btn {
      margin-top: 6px; padding: 6px 14px; background: #fff; border: 1px solid #1a56db;
      color: #1a56db; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .copy-btn:hover { background: #e8f0fe; }
    .copied { color: #1e6b2e; font-size: 12px; margin-left: 8px; display: none; }
    .print-btn {
      margin-top: 8px; padding: 8px 16px; background: #e67e22; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
      display: block; width: 100%;
    }
    .print-btn:hover { background: #ca6f1e; }
    .reset-btn {
      padding: 8px 16px; background: #fff; color: #1a56db;
      border: 1px solid #1a56db; border-radius: 4px; cursor: pointer;
      font-size: 13px; font-weight: bold; white-space: nowrap;
    }
    .reset-btn:hover { background: #e8f0fe; }
  </style>
</head>
<body>

<div class="section">
  <div class="section-title">担当者</div>
  <label>担当者名 <span style="color:red">*</span></label>
  <select id="staff" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;font-size:13px;">
    <option value="">-- 選択してください --</option>
  </select>
</div>

<div class="section">
  <div class="section-title">スタイリスト情報</div>
  <label>スタイリスト名 <span style="color:red">*</span></label>
  <input type="text" id="stylist" placeholder="例：石上 恵">
  <label>電話番号</label>
  <input type="text" id="phone" placeholder="例：090-1234-5678">
</div>

<div class="section">
  <div class="section-title">媒体セット <span style="color:red">*</span></div>
  <div id="mediaSetList"></div>
  <button class="add-btn" onclick="addMediaSet()">＋ 媒体セットを追加</button>
</div>

<div class="section">
  <div class="section-title">撮影情報</div>
  <label>返却予定日</label>
  <input type="date" id="plannedReturnDate">
</div>

<div class="section">
  <div class="section-title">貸出アイテム <span style="color:red">*</span></div>
  <div id="itemList"></div>
  <button class="add-btn" onclick="addItem()">＋ アイテムを追加</button>
</div>

<button class="submit-btn" id="submitBtn" onclick="submit()">登録する</button>

<div class="result-box" id="resultBox">
  <div class="result-title" id="resultTitle"></div>
  <div id="resultMsg"></div>
  <textarea class="msg-text" id="msgText" readonly></textarea>
  <div id="copyArea">
    <button class="copy-btn" onclick="copyMsg()">テキストをコピー</button>
    <span class="copied" id="copiedMsg">コピーしました！</span>
  </div>
</div>

<script>
  var mediaSetCount = 0;
  var itemCount = 0;

  function addMediaSet() {
    mediaSetCount++;
    var id = 'ms_' + mediaSetCount;
    var div = document.createElement('div');
    div.className = 'media-set';
    div.id = id;
    div.innerHTML =
      '<button class="remove-btn" onclick="removeEl(\'' + id + '\')" title="削除">✕</button>' +
      '<div class="media-set-grid">' +
        '<div class="full"><label>種別 <span style="color:red">*</span></label>' +
          '<select id="' + id + '_type">' +
            '<option value="雑誌(紙面)">雑誌(紙面)</option>' +
            '<option value="雑誌(WEB)">雑誌(WEB)</option>' +
            '<option value="TV">TV</option>' +
            '<option value="その他">その他</option>' +
          '</select></div>' +
        '<div class="full"><label>媒体名 <span style="color:red">*</span></label>' +
          '<input type="text" id="' + id + '_media" placeholder="例：Vogue"></div>' +
        '<div><label>月号 <span style="color:red">*</span></label>' +
          '<input type="text" id="' + id + '_issue" placeholder="例：4月号" required></div>' +
        '<div><label>公開日 <span style="color:red">*</span></label>' +
          '<input type="date" id="' + id + '_releaseDate" required></div>' +
        '<div class="full"><label>テーマ/着用者 <span style="color:red">*</span></label>' +
          '<input type="text" id="' + id + '_theme" placeholder="例：夏コーデ/石上恵" required></div>' +
        '<div><label>撮影日</label>' +
          '<input type="date" id="' + id + '_shootDate"></div>' +
      '</div>';
    document.getElementById('mediaSetList').appendChild(div);
  }

  function addItem() {
    itemCount++;
    var id = 'item_' + itemCount;
    var div = document.createElement('div');
    div.className = 'item-row';
    div.id = id;
    div.innerHTML =
      '<button class="remove-btn" onclick="removeEl(\'' + id + '\')" title="削除">✕</button>' +
      '<div class="full"><label>ブランド <span style="color:red">*</span></label>' +
        '<input type="text" id="' + id + '_brand" placeholder="例：UNTITLED" required></div>' +
      '<div class="full"><label>品番 <span style="color:red">*</span></label>' +
        '<input type="text" id="' + id + '_code" placeholder="例：62AFP349" required></div>' +
      '<div><label>色番 <span style="color:red">*</span></label>' +
        '<input type="text" id="' + id + '_color" placeholder="例：(1)ベージュ" required></div>' +
      '<div><label>単価 <span style="color:red">*</span></label>' +
        '<input type="number" id="' + id + '_price" placeholder="60500" min="0" required></div>' +
      '<div class="full"><label>アイテム名 <span style="color:red">*</span></label>' +
        '<input type="text" id="' + id + '_name" placeholder="例：スラブツイードギャバジン" required></div>';
    document.getElementById('itemList').appendChild(div);
  }

  function removeEl(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
  }

  function getMediaSets() {
    var sets = [];
    var els = document.querySelectorAll('#mediaSetList .media-set');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      var id = el.id;
      var media = (document.getElementById(id + '_media') || {}).value || '';
      if (!media.trim()) continue;
      var issue = ((document.getElementById(id + '_issue') || {}).value || '').trim();
      var theme = ((document.getElementById(id + '_theme') || {}).value || '').trim();
      var releaseDate = (document.getElementById(id + '_releaseDate') || {}).value || '';
      if (!issue) { alert('媒体「' + media.trim() + '」の月号を入力してください。'); return null; }
      if (!theme) { alert('媒体「' + media.trim() + '」のテーマ/着用者を入力してください。'); return null; }
      if (!releaseDate) { alert('媒体「' + media.trim() + '」の公開日を入力してください。'); return null; }
      sets.push({
        media:       media.trim(),
        issue:       issue,
        theme:       theme,
        releaseDate: releaseDate,
        type:        (document.getElementById(id + '_type') || {}).value || '',
        shootDate:   (document.getElementById(id + '_shootDate') || {}).value || ''
      });
    }
    return sets;
  }

  function getItems() {
    var items = [];
    var els = document.querySelectorAll('#itemList .item-row');
    for (var i = 0; i < els.length; i++) {
      var row = els[i];
      var id = row.id;
      var code = ((document.getElementById(id + '_code') || {}).value || '').trim();
      var name = ((document.getElementById(id + '_name') || {}).value || '').trim();
      if (!code && !name) continue;
      var brand = ((document.getElementById(id + '_brand') || {}).value || '').trim();
      var colorCode = ((document.getElementById(id + '_color') || {}).value || '').trim();
      var price = (document.getElementById(id + '_price') || {}).value || '';
      if (!brand) { alert('アイテムのブランドを入力してください。'); return null; }
      if (!code) { alert('アイテムの品番を入力してください。'); return null; }
      if (!colorCode) { alert('アイテムの色番を入力してください。'); return null; }
      if (!name) { alert('アイテム名を入力してください。'); return null; }
      if (!price) { alert('アイテムの単価を入力してください。'); return null; }
      items.push({
        brand:     brand,
        itemCode:  code,
        colorCode: colorCode,
        itemName:  name,
        price:     price
      });
    }
    return items;
  }

  function submit() {
    var staff = document.getElementById('staff').value;
    if (!staff) { alert('担当者名を選択してください。'); return; }
    var stylist = document.getElementById('stylist').value.trim();
    if (!stylist) { alert('スタイリスト名を入力してください。'); return; }
    var mediaSets = getMediaSets();
    if (mediaSets === null) return;
    if (mediaSets.length === 0) { alert('媒体セットを1つ以上追加してください。'); return; }
    var items = getItems();
    if (items === null) return;
    if (items.length === 0) { alert('アイテムを1つ以上追加してください。'); return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '登録中...';

    var data = {
      staff:              staff,
      stylist:            stylist,
      phone:              document.getElementById('phone').value.trim(),
      mediaSets:          mediaSets,
      plannedReturnDate:  document.getElementById('plannedReturnDate').value,
      items:              items
    };

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = '登録する';
        showResult(res);
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = '登録する';
        showResult({ success: false, message: 'システムエラー: ' + err.message });
      })
      .registerLoan(data);
  }

  function showResult(res) {
    var box = document.getElementById('resultBox');
    var title = document.getElementById('resultTitle');
    var msgDiv = document.getElementById('resultMsg');
    var msgText = document.getElementById('msgText');

    box.style.display = 'block';
    if (res.success) {
      box.className = 'result-box';
      title.textContent = '登録完了！伝票番号: ' + res.slipNo;
      msgDiv.innerHTML =
        '<div style="display:flex;gap:8px;margin-top:4px;">' +
          '<button class="reset-btn" style="flex:1;" onclick="resetForm()">続けて登録する</button>' +
        '</div>';
      msgText.style.display = 'none';
      document.getElementById('copyArea').style.display = 'none';
      document.getElementById('submitBtn').style.display = 'none';
    } else {
      box.className = 'result-box error';
      title.textContent = 'エラー';
      msgDiv.textContent = res.message;
      msgText.style.display = 'none';
    }
    box.scrollIntoView({ behavior: 'smooth' });
  }

  function copyMsg() {
    var el = document.getElementById('msgText');
    el.select();
    document.execCommand('copy');
    var copied = document.getElementById('copiedMsg');
    copied.style.display = 'inline';
    setTimeout(function() { copied.style.display = 'none'; }, 2000);
  }

  function openPrintDialog(slipNo) {
    google.script.run.openPrintSlipDialogWithNo(slipNo);
  }

  function resetForm() {
    document.getElementById('staff').value = '';
    document.getElementById('stylist').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('plannedReturnDate').value = '';
    document.getElementById('mediaSetList').innerHTML = '';
    document.getElementById('itemList').innerHTML = '';
    mediaSetCount = 0;
    itemCount = 0;
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'block';
    addMediaSet();
    addItem();
    window.scrollTo(0, 0);
  }

  // 担当者リスト読み込み
  function populateStaffSelect(list) {
    var sel = document.getElementById('staff');
    list.forEach(function(name) {
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
  }
  google.script.run
    .withSuccessHandler(populateStaffSelect)
    .withFailureHandler(function() {})
    .getStaffList();

  // 初期表示
  addMediaSet();
  addItem();
</script>
</body>
</html>
