<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; color: #333; padding: 16px; }
    h3 { margin-bottom: 14px; font-size: 15px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    select, input[type=text] {
      padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 13px; width: 100%;
    }
    select:focus, input:focus { outline: none; border-color: #4a90d9; }
    .preview-btn {
      margin-top: 14px; width: 100%; padding: 9px;
      background: #f0f4ff; color: #1a56db; border: 1px solid #b3c9f5;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .preview-btn:hover { background: #dce8fd; }
    #previewArea { display: none; margin-top: 14px; }
    #previewArea table { width: 100%; border-collapse: collapse; font-size: 11px; }
    #previewArea th { background: #4a4a4a; color: #fff; padding: 5px 6px; text-align: left; }
    #previewArea td { padding: 5px 6px; border-bottom: 1px solid #eee; }
    #previewArea tr:hover td { background: #f5f8ff; }
    .no-data { color: #999; text-align: center; padding: 16px; }
    .recipients-box {
      background: #f7f9fc; border: 1px solid #dce7f5; border-radius: 4px;
      padding: 10px; margin-top: 10px; font-size: 12px; color: #444;
    }
    .recipients-box .addr { padding: 2px 0; }
    .footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .cancel-btn {
      padding: 8px 18px; background: #fff; color: #555;
      border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
    }
    .send-btn {
      padding: 8px 24px; background: #1a56db; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .send-btn:hover { background: #1545b3; }
    .send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .msg { padding: 10px; border-radius: 4px; font-size: 13px; margin-top: 10px; }
    .msg.error { background: #fce8e6; color: #c0392b; border: 1px solid #f5c6c3; }
    .msg.success { background: #e6f4ea; color: #1e6b2e; border: 1px solid #aad4b2; }
    .count-badge {
      display: inline-block; background: #1a56db; color: #fff;
      border-radius: 12px; padding: 2px 10px; font-size: 11px; margin-left: 6px;
    }
  </style>
</head>
<body>

<h3>月末配信</h3>

<label>対象年</label>
<select id="year"></select>

<label>対象月</label>
<select id="month">
  <option value="1">1月</option><option value="2">2月</option>
  <option value="3">3月</option><option value="4">4月</option>
  <option value="5">5月</option><option value="6">6月</option>
  <option value="7">7月</option><option value="8">8月</option>
  <option value="9">9月</option><option value="10">10月</option>
  <option value="11">11月</option><option value="12">12月</option>
</select>

<button class="preview-btn" onclick="loadPreview()">データを確認する</button>

<div id="msgArea"></div>

<div id="previewArea">
  <p style="margin-top:14px; font-size:12px; color:#555;">
    掲載データ <span class="count-badge" id="itemCount">0</span> 件
  </p>
  <div style="max-height:160px; overflow-y:auto; margin-top:6px;">
    <table id="previewTable">
      <thead>
        <tr>
          <th>雑誌名</th><th>種別</th><th>掲載号</th><th>公開日</th><th>テーマ/着用者</th><th>スタイリスト</th>
          <th>品番</th><th>色番</th><th>上代</th><th>アイテム</th><th>頁</th><th>画像/リンク</th>
        </tr>
      </thead>
      <tbody id="previewBody"></tbody>
    </table>
    <div class="no-data" id="noData" style="display:none;">該当データがありません</div>
  </div>

  <label style="margin-top:14px;">送信先</label>
  <div class="recipients-box" id="recipientsBox">読み込み中...</div>

  <div class="footer">
    <button class="cancel-btn" onclick="google.script.host.close()">キャンセル</button>
    <button class="send-btn" id="sendBtn" onclick="sendEmail()">メールを送信</button>
  </div>
</div>

<script>
  var previewItems = [];
  var recipients = [];

  (function() {
    var now = new Date();
    var thisYear = now.getFullYear();
    var sel = document.getElementById('year');
    for (var y = thisYear - 1; y <= thisYear + 1; y++) {
      var opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '年';
      if (y === thisYear) opt.selected = true;
      sel.appendChild(opt);
    }
    document.getElementById('month').value = String(now.getMonth() + 1);
  })();

  function showMsg(text, type) {
    document.getElementById('msgArea').innerHTML = text
      ? '<div class="msg ' + type + '">' + text + '</div>'
      : '';
  }

  function loadPreview() {
    var year  = parseInt(document.getElementById('year').value, 10);
    var month = parseInt(document.getElementById('month').value, 10);
    document.getElementById('previewArea').style.display = 'none';
    showMsg('データを読み込み中...', '');

    google.script.run
      .withSuccessHandler(function(items) {
        previewItems = items;
        renderPreview(items);

        google.script.run
          .withSuccessHandler(function(addrs) {
            recipients = addrs;
            renderRecipients(addrs);
          })
          .withFailureHandler(function(err) {
            document.getElementById('recipientsBox').textContent = 'エラー: ' + err.message;
          })
          .getEmailRecipients();
      })
      .withFailureHandler(function(err) {
        showMsg('エラー: ' + err.message, 'error');
      })
      .getPublishDataForMonth(year, month);
  }

  function renderPreview(items) {
    showMsg('', '');
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('itemCount').textContent = items.length;

    var tbody = document.getElementById('previewBody');
    tbody.innerHTML = '';

    if (items.length === 0) {
      document.getElementById('noData').style.display = 'block';
      document.getElementById('previewTable').style.display = 'none';
      return;
    }
    document.getElementById('noData').style.display = 'none';
    document.getElementById('previewTable').style.display = 'table';

    items.forEach(function(item) {
      var tr = document.createElement('tr');
      var price = item.price ? '¥' + Number(item.price).toLocaleString() : '';
      tr.innerHTML =
        '<td>' + (item.media || '') + '</td>' +
        '<td>' + (item.type || '') + '</td>' +
        '<td>' + (item.issue || '') + '</td>' +
        '<td>' + (item.releaseDate || '') + '</td>' +
        '<td>' + (item.theme || '') + '</td>' +
        '<td>' + (item.stylist || '') + '</td>' +
        '<td>' + (item.itemCode || '') + '</td>' +
        '<td>' + (item.colorCode || '') + '</td>' +
        '<td>' + price + '</td>' +
        '<td>' + (item.itemName || '') + '</td>' +
        '<td>' + (item.page || '') + '</td>' +
        '<td>' + (item.imageLink || '') + '</td>';
      tbody.appendChild(tr);
    });
  }

  function renderRecipients(addrs) {
    var box = document.getElementById('recipientsBox');
    if (!addrs || addrs.length === 0) {
      box.innerHTML = '<span style="color:#c0392b;">送信先が設定されていません。設定シートにメールアドレスを入力してください。</span>';
      return;
    }
    box.innerHTML = addrs.map(function(a) {
      return '<div class="addr">' + a + '</div>';
    }).join('');
  }

  function sendEmail() {
    if (previewItems.length === 0) {
      showMsg('送信するデータがありません。', 'error');
      return;
    }
    if (!recipients || recipients.length === 0) {
      showMsg('送信先が設定されていません。設定シートにメールアドレスを入力してください。', 'error');
      return;
    }

    if (!confirm(recipients.length + '件のアドレスにメールを送信します。よろしいですか？')) return;

    var btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    var year  = parseInt(document.getElementById('year').value, 10);
    var month = parseInt(document.getElementById('month').value, 10);

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = 'メールを送信';
        if (res.success) {
          showMsg(res.count + '件のアドレスに送信しました！', 'success');
        } else {
          showMsg(res.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = 'メールを送信';
        showMsg('システムエラー: ' + err.message, 'error');
      })
      .sendMonthlyEmail({ year: year, month: month, items: previewItems, recipients: recipients });
  }
</script>
</body>
</html>
